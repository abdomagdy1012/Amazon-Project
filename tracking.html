<!DOCTYPE html>
<html>
  <head>
    <title>Tracking</title>

    <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/tracking.css">
  </head>
  <body>
      <div class="header">
        <div class="logo"> 
            <a href="amazon.html" class="logo-anchor">
                <img src="images/amazon-logo-white.png" alt="amazon logo">
                <img src="images/amazon-mobile-logo-white.png" alt="amazon mobile" class="amazon-mobile">
            </a>
        </div>
        <div class="search">
            <input type="text" placeholder="Search">
            <button>
                <img src="images/icons/search-icon.png" alt="">
            </button>
        </div>
            <div class="right-section" class="logo-anchor">
                <a href="orders.html" class="logo-anchor"> 
                    <span class="Returns">Returns
                    <span class="Orders">& Orders</span>
                    </span>
                </a>
                <a href="checkout.html" class="cart-anchor">
                    <img class="cart-logo" src="images/icons/cart-icon.png" alt="">
                    <div class="cart-num">0</div>
                    <div class="Cart"> Cart</div>
                </a>
                
            </div>
    </div>

    <div class="main">
      <div class="order-tracking">
        <a class="back-to-orders-link link-primary" href="orders.html">
          View all orders
        </a>

        <div class="delivery-date">
          Arriving on Monday, June 13
        </div>

        <div class="product-info">
          Black and Gray Athletic Cotton Socks - 6 Pairs
        </div>

        <div class="product-info">
          Quantity: 1
        </div>

        <img class="product-image" src="images/products/athletic-cotton-socks-6-pairs.jpg">

        <div class="progress-labels-container">
          <div class="progress-label">
            Preparing
          </div>
          <div class="progress-label current-status">
            Shipped
          </div>
          <div class="progress-label">
            Delivered
          </div>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
  </body>
</html>
