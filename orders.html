<!DOCTYPE html>
<html>
  <head>
    <title>Orders</title>

    <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/orders.css">
  </head>
  <body>
    <div class="header">
        <div class="logo"> 
            <a href="amazon.html" class="logo-anchor">
                <img src="images/amazon-logo-white.png" alt="amazon logo">
                <img src="images/amazon-mobile-logo-white.png" alt="amazon mobile" class="amazon-mobile">
            </a>
        </div>
        <div class="search">
            <input type="text" placeholder="Search">
            <button>
                <img src="images/icons/search-icon.png" alt="">
            </button>
        </div>
            <div class="right-section" class="logo-anchor">
                <a href="orders.html" class="logo-anchor"> 
                    <span class="Returns">Returns
                    <span class="Orders">& Orders</span>
                    </span>
                </a>
                <a href="checkout.html" class="cart-anchor">
                    <img class="cart-logo" src="images/icons/cart-icon.png" alt="">
                    <div class="cart-num">3</div>
                    <div class="Cart"> Cart</div>
                </a>
                
            </div>
    </div>

    <div class="main">
      <div class="page-title">Your Orders</div>

        <div class="orders-grid js-display-order">

        </div>
      </div>
    <script type="module" src="script/orders.js"></script>
  </body>
</html>
